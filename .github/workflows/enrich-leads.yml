name: Enrich Leads (Find Emails)

on:
  workflow_dispatch: {} # manual trigger only for now -- add a schedule once Phase 2 is proven out

concurrency:
  group: enrich-leads
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run email enrichment
        env:
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
        run: node scripts/enrichLeads.js

      - name: Commit and push updated leads.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leads.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: enrich leads with emails $(date -u +'%Y-%m-%d')"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push rejected (attempt $i) -- pulling latest and rebasing..."
            if ! git pull --rebase origin main; then
              git rebase --abort
              echo "Push failed due to conflicting data. Re-run once other runs finish."
              exit 1
            fi
            sleep 3
          done

          echo "Push failed after multiple retries."
          exit 1
