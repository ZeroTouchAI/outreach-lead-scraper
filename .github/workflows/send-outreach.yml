name: Send Outreach Emails

on:
  schedule:
    # 15:00 UTC = 11am ET -- 2 hours after the 13:00 UTC scrape/enrich
    # pipeline, timed for better open rates than sending first thing.
    # Scheduled runs always send LIVE (test_mode has no effect here --
    # GitHub doesn't pass workflow_dispatch inputs to schedule triggers).
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "true = only send to internal test leads. false = send to real leads."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: send-outreach-emails
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send outreach emails
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OUTREACH_FROM: ${{ secrets.OUTREACH_FROM }}
          OUTREACH_REPLY_TO: "info@rapidrankagency.com"
          TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode || 'false' }}
        run: node scripts/sendOutreachEmails.js

      - name: Refresh dashboard snapshot (zero-cost)
        run: node scripts/rebuildDashboard.js

      - name: Commit updated lead statuses and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leads.json data/dashboardData.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: send outreach emails + refresh dashboard $(date -u +'%Y-%m-%d')"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push rejected (attempt $i) -- pulling latest and rebasing..."
            if ! git pull --rebase origin main; then
              git rebase --abort
              echo "Push failed due to conflicting data."
              exit 1
            fi
            sleep 3
          done

          echo "Push failed after multiple retries."
          exit 1
