name: Scrape Leads

on:
  schedule:
    # Runs once a day at 13:00 UTC (9am ET).
    - cron: "0 13 * * *"
  workflow_dispatch: {} # allows manual "Run workflow" trigger from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run lead scraper
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/findLeads.js

      - name: Commit updated leads.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leads.json
          git diff --staged --quiet || git commit -m "chore: update leads $(date -u +'%Y-%m-%d')"
          git push
